bind t send-keys C-t
bind g command-prompt -p "Pane name:" -I "#{pane_title}" "select-pane -T '%%'"

# Quota monitor lines (Z.AI + Codex snapshot)
run-shell -b '/root/.local/bin/tmux-load-opencode-key.sh'
# Load Z.AI key from opencode auth.json on attach
set-hook -g client-attached 'run-shell -b /root/.local/bin/tmux-load-opencode-key.sh'
set -ag update-environment ' ZAI_API_KEY ZHIPU_API_KEY ZAI_API_BASE'
set -g base-index 1
set -g renumber-windows on
set -g mouse on
set -g status-position bottom
set -g status 2
set -g status-interval 20
set -g status-style 'bg=colour235,fg=colour255'
set -g status-format[0] '#[align=left]#[fg=colour252]#(/root/.local/bin/tmux-path-right.sh "#{pane_current_path}" 52)#[default] #(/root/.local/bin/tmux-git-segment.sh "#{pane_current_path}")#[align=right]#[bg=colour52,fg=colour231,bold] CODEX #[default] #(/root/.local/bin/tmux-codex-quota.sh) #[fg=colour245]│#[default] #[bg=colour22,fg=colour231,bold] Z.AI #[default] #(/root/.local/bin/tmux-zai-quota.sh)'
set -gu status-format[2]
set -g status-format[1] '#[align=left]#[fg=colour255,bold]#(/root/.local/bin/tmux-pane-list.sh)#[default]#[align=right]#[fg=colour252]#(/root/.local/bin/tmux-right-stats.sh 48)#[default]'
set -g status-justify centre
set -g status-left-length 0
set -g status-right-length 0
set -g status-left ''
set -g window-status-format '#[range=user|#{window_id}]#[fg=colour250,bold] #I:#W#[default]#[norange]'
set -g window-status-current-format '#[range=user|#{window_id}]#[bg=colour24,fg=colour231,bold] #I:#W #[default]#[norange]'
set -g status-right ''

bind-key -T root MouseDown1Status run-shell -b '/root/.local/bin/tmux-status-click.sh "#{mouse_status_range}" "#{client_tty}"'
